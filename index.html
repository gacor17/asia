<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0f0f0f,
#171717,
#1f1f1f
);
}

.container{
width:400px;
background:#111111;
border-radius:20px;
padding:30px;
box-shadow:
0 0 40px rgba(255,193,7,.15),
0 15px 40px rgba(0,0,0,.5);
border:1px solid rgba(255,193,7,.15);
}

.title{
text-align:center;
margin-bottom:20px;
font-size:28px;
font-weight:bold;
color:#ffc107;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.3s;
}

.active{
background:#ffc107;
color:#000;
}

.not-active{
background:#1b1b1b;
color:#999;
}

.form{
display:none;
}

.form.active-form{
display:block;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #333;
border-radius:12px;
background:#181818;
color:white;
outline:none;
transition:.3s;
}

input:focus{
border-color:#ffc107;
box-shadow:
0 0 15px rgba(255,193,7,.3);
}

input::placeholder{
color:#777;
}

.submit-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:
linear-gradient(
135deg,
#ffc107,
#ffb300
);
color:#000;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:
0 8px 20px rgba(255,193,7,.35);
}

</style>
</head>
<body>

<div class="container">

<div class="title">
🔐 Login System
</div>

<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="signupTab" class="not-active">Sign Up</button>
</div>

<div id="loginForm" class="form active-form">

<input type="email" id="loginEmail" placeholder="Email">

<input type="password" id="loginPassword" placeholder="Password">

<button class="submit-btn" onclick="login()">
Login
</button>

</div>

<div id="signupForm" class="form">

<input type="email" id="signupEmail" placeholder="Email">

<input type="password" id="signupPassword" placeholder="Password">

<button class="submit-btn" onclick="signup()">
Buat Akun
</button>

</div>

</div>

<script>

const loginTab=document.getElementById("loginTab");
const signupTab=document.getElementById("signupTab");

const loginForm=document.getElementById("loginForm");
const signupForm=document.getElementById("signupForm");

loginTab.onclick=function(){

loginForm.classList.add("active-form");
signupForm.classList.remove("active-form");

loginTab.className="active";
signupTab.className="not-active";

}

signupTab.onclick=function(){

signupForm.classList.add("active-form");
loginForm.classList.remove("active-form");

signupTab.className="active";
loginTab.className="not-active";

}

function signup(){

const email=document.getElementById("signupEmail").value.trim();
const password=document.getElementById("signupPassword").value;

if(!email || !password){

alert("Lengkapi data");
return;

}

let users=
JSON.parse(localStorage.getItem("users")) || [];

let cek=
users.find(u=>u.email===email);

if(cek){

alert("Email sudah terdaftar");
return;

}

users.push({
email:email,
password:password
});

localStorage.setItem(
"users",
JSON.stringify(users)
);

alert("Akun berhasil dibuat");

signupForm.classList.remove("active-form");
loginForm.classList.add("active-form");

}

function login(){

const email=document.getElementById("loginEmail").value.trim();
const password=document.getElementById("loginPassword").value;

let users=
JSON.parse(localStorage.getItem("users")) || [];

let user=
users.find(
u=>u.email===email &&
u.password===password
);

if(user){

localStorage.setItem(
"isLogin",
"true"
);

localStorage.setItem(
"currentUser",
email
);

window.location.href="dashboard.html";

}else{

alert("Email atau password salah");

}

}

</script>

</body>
</html>
