<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIIDEY STREAMING</title>

<!-- ============================= -->
<!-- TWITTER & OPEN GRAPH META -->
<!-- ============================= -->

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="VIIDEY Streaming">
<meta name="twitter:description" content="Watch full video only on VIIDEY">
<meta name="twitter:image" content="20260303_021117.webp">

<meta property="og:type" content="website">
<meta property="og:title" content="VIIDEY Streaming">
<meta property="og:description" content="Watch full video only on VIIDEY">
<meta property="og:image" content="20260303_021117.webp">
<meta property="og:url" content="">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:#09090b;
color:#fafafa;
}
#video-container{
width:100%;
max-width:1100px;
margin:auto;
border-radius:16px;
overflow:hidden;
background:#000;
box-shadow:0 25px 50px -12px rgba(0,0,0,.5);
}
#video-player{
width:100%;
background:#000;
object-fit:contain;
max-height:90vh;
}
.loading-spinner{
border:3px solid rgba(255,255,255,.1);
border-top:3px solid #3b82f6;
border-radius:50%;
width:50px;
height:50px;
animation:spin 1s linear infinite;
position:absolute;
top:50%;
left:50%;
margin:-25px 0 0 -25px;
display:none;
}
@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
.btn-gradient{
background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);
transition:.3s;
}
.btn-gradient:hover{
transform:translateY(-2px);
box-shadow:0 10px 15px -3px rgba(59,130,246,.4);
}
.recommend-card:hover{
transform:scale(1.05);
transition:.3s;
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<header class="sticky top-0 z-50 px-6 py-4 bg-zinc-900 border-b border-zinc-800">
<div class="max-w-7xl mx-auto flex justify-between items-center">
<img src="20260303_021117.webp" width="120" height="40">
<button id="download-button" class="btn-gradient text-white text-sm px-5 py-2.5 rounded-full font-semibold">
<i class="fas fa-download mr-2"></i>Download
</button>
</div>
</header>

<main class="flex-grow py-8 px-4">

<div id="video-container" class="relative">
<div class="loading-spinner" id="loading-spinner"></div>
<video id="video-player" controls preload="auto" controlsList="nodownload noremoteplayback" disablePictureInPicture></video>
</div>

<div id="error-message" class="hidden mt-6 p-4 bg-red-900/20 border border-red-500/50 text-red-400 rounded-xl text-center">
<span id="error-text"></span>
</div>

<section class="mt-8">
<h2 id="video-title" class="text-2xl font-bold mb-4">Memuat Judul...</h2>
<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
<p id="video-description" class="text-zinc-400">Memuat deskripsi...</p>
</div>
</section>

<section class="mt-12">
<h3 class="text-xl font-bold mb-6">Rekomendasi Video</h3>
<div id="recommendation-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
</section>

</main>

<footer class="border-t border-zinc-900 py-8 text-center text-zinc-500 text-sm">
© 2026 INGAT VIRAL INGAT VIIDEY
</footer>

<script>
function updateMeta(property, content){
let el = document.querySelector(`meta[name='${property}'], meta[property='${property}']`);
if(el) el.setAttribute("content", content);
}

document.addEventListener('DOMContentLoaded', async () => {

let urlPath = window.location.pathname.replace(/^\\//,'');
let videoId = urlPath.startsWith('e/') ? urlPath.substring(2) : urlPath;

const videoPlayer = document.getElementById('video-player');
const videoTitle = document.getElementById('video-title');
const videoDescription = document.getElementById('video-description');
const loadingSpinner = document.getElementById('loading-spinner');
const errorMessage = document.getElementById('error-message');
const errorText = document.getElementById('error-text');
const downloadButton = document.getElementById('download-button');
const recommendationList = document.getElementById('recommendation-list');

if(!videoId){
errorText.textContent='ID video tidak ditemukan.';
errorMessage.classList.remove('hidden');
return;
}

loadingSpinner.style.display='block';

try{

const response = await axios.get('https://raw.githubusercontent.com/liwa22/json/refs/heads/main/Video.json',{timeout:10000});
const videos = response.data;
const foundVideo = videos.find(v=>v.id===videoId);

if(foundVideo){

videoPlayer.src = foundVideo.Url + "#t=1.0";
videoTitle.textContent = foundVideo.Judul || "Untitled Video";
videoDescription.textContent = foundVideo.Description || "Tidak ada deskripsi.";
videoPlayer.load();

// =========================
// UPDATE META DINAMIS
// =========================

document.title = foundVideo.Judul || "VIIDEY Streaming";

updateMeta("twitter:title", foundVideo.Judul);
updateMeta("twitter:description", foundVideo.Description || "Watch full video only on VIIDEY");
updateMeta("og:title", foundVideo.Judul);
updateMeta("og:description", foundVideo.Description || "Watch full video only on VIIDEY");

if(foundVideo.Thumbnail){
updateMeta("twitter:image", foundVideo.Thumbnail);
updateMeta("og:image", foundVideo.Thumbnail);
}

updateMeta("og:url", window.location.href);

// =========================
// DOWNLOAD BUTTON
// =========================

downloadButton.addEventListener('click', () => {
window.location.href = foundVideo.Url;
});

// =========================
// REKOMENDASI
// =========================

videos
.filter(v=>v.id!==videoId)
.sort(()=>0.5-Math.random())
.slice(0,10)
.forEach(video=>{
const card = document.createElement('a');
card.href='/' + video.id;
card.className="recommend-card bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden";

card.innerHTML = `
<div class="aspect-[9/16] bg-black overflow-hidden">
<img src="${video.Thumbnail || '20260303_021117.webp'}" class="w-full h-full object-cover">
</div>
<div class="p-3">
<p class="text-sm font-semibold text-white line-clamp-2">${video.Judul || 'Untitled Video'}</p>
</div>
`;

recommendationList.appendChild(card);
});

}else{
errorText.textContent='Video tidak ditemukan.';
errorMessage.classList.remove('hidden');
}

}catch(error){
errorText.textContent='Gagal memuat data video.';
errorMessage.classList.remove('hidden');
}finally{
loadingSpinner.style.display='none';
}

});

document.addEventListener('contextmenu',e=>e.preventDefault());
</script>

</body>
</html>
