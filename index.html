<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Video Streaming</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

#video-container{
  max-width:1000px;
  margin:auto;
}

.btn{
  background:#2563eb;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
}
.btn:hover{
  background:#1d4ed8;
}
</style>
</head>

<body class="p-6">

<h1 class="text-xl font-bold mb-6">Streaming Video</h1>

<div id="video-container">
  <video id="video-player" controls class="w-full bg-black rounded-xl"></video>
</div>

<h2 id="video-title" class="text-2xl font-bold mt-4"></h2>

<button id="download-button" class="btn mt-3">Download</button>

<!-- REKOMENDASI -->
<section class="mt-12">
  <h3 class="text-lg font-bold mb-4">Rekomendasi Video Lain</h3>
  <div id="recommendation-container" class="grid md:grid-cols-3 gap-4"></div>
</section>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const JSON_URL = "https://raw.githubusercontent.com/USERNAME/REPO/main/Video.json"; // GANTI INI

let path = window.location.pathname.replace(/^\\//,'');
let videoId = path.startsWith("e/") ? path.substring(2) : path;

const player = document.getElementById("video-player");
const title = document.getElementById("video-title");
const downloadBtn = document.getElementById("download-button");
const recContainer = document.getElementById("recommendation-container");

if(!videoId){
  alert("ID video tidak ditemukan di URL");
  return;
}

try{

const response = await axios.get(JSON_URL);
const videos = response.data;

const currentVideo = videos.find(v => v.id === videoId);

if(!currentVideo){
  alert("Video tidak ditemukan");
  return;
}

// Load video
player.src = currentVideo.Url;
title.textContent = currentVideo.Judul;
downloadBtn.onclick = () => window.location.href = currentVideo.Url;

// Render rekomendasi
renderRecommendations(videos, videoId);

}catch(err){
console.error(err);
alert("Gagal memuat JSON");
}

function renderRecommendations(videos, currentId){

const filtered = videos.filter(v => v.id !== currentId);
const shuffled = filtered.sort(() => 0.5 - Math.random());
const selected = shuffled.slice(0,5);

recContainer.innerHTML = selected.map(video => `
  <a href="/e/${video.id}" class="bg-zinc-800 p-4 rounded-xl hover:bg-zinc-700 transition">
    <p class="font-semibold">${video.Judul}</p>
  </a>
`).join("");

}

});
</script>

</body>
</html>
