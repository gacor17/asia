<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LOGIN FORM</title>

<style>
/* ==========================================
   UI DESIGN: REALISTIC LIQUID GLASS
   (Mengikuti referensi gambar oval/air)
   ========================================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    
    /* Ganti bg-bunga.jpg dengan nama file gambar Anda */
    background-image: url('867c83b8c949f3a6e89d90fa6643df0e.jpg'); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #5a8ab4; /* Warna cadangan jika gambar belum dimuat */
}

/* ==========================================
   CONTAINER BENTUK KACA / AIR LONJONG
   ========================================== */
.container {
    position: relative;
    z-index: 2;
    width: 380px;
    padding: 40px 35px;
    
    /* Membuat bentuk oval/kapsul */
    border-radius: 50px; 
    
    /* Warna kaca yang sangat tipis */
    background: linear-gradient(
        135deg, 
        rgba(255, 255, 255, 0.15) 0%, 
        rgba(255, 255, 255, 0.02) 100%
    );
    
    /* Blur yang rendah agar bunga di belakang tetap terlihat jelas */
    backdrop-filter: blur(6px) saturate(120%);
    -webkit-backdrop-filter: blur(6px) saturate(120%);
    
    /* Garis pinggir kaca: atas tebal (pantulan lampu), bawah lebih tipis */
    border-top: 2px solid rgba(255, 255, 255, 0.7);
    border-left: 1px solid rgba(255, 255, 255, 0.4);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom: 1.5px solid rgba(255, 255, 255, 0.4);
    
    /* RAHASIA EFEK AIR DI BAWAH: Kombinasi Inset Shadow */
    box-shadow: 
        /* Bayangan jatuh ke belakang */
        0 30px 60px rgba(0, 0, 0, 0.25),
        /* Cahaya putih di tepi atas dalam */
        inset 0 5px 15px rgba(255, 255, 255, 0.4),
        /* Kumpulan pantulan cahaya "air" yang menebal di bagian dasar */
        inset 0 -30px 40px rgba(255, 255, 255, 0.35),
        /* Garis kilap putih tajam persis di dasar wadah */
        inset 0 -3px 6px rgba(255, 255, 255, 0.8);
}

/* Tipografi */
.title {
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 30px;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

/* Tabs */
.tabs {
    display: flex;
    padding: 4px;
    border-radius: 20px;
    background: rgba(0, 0, 0, 0.2);
    margin-bottom: 30px;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
}

.tabs button {
    flex: 1;
    padding: 12px 0;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    background: transparent;
    color: rgba(255, 255, 255, 0.6);
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

.tabs button.active {
    background: rgba(255, 255, 255, 0.25);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    backdrop-filter: blur(5px);
}

/* Wrapper untuk transisi */
.form-wrapper {
    position: relative;
    overflow-x: hidden;
    min-height: 220px;
}

/* Base Form - Transisi Geser */
.form {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
}

#loginForm { transform: translateX(-30px); }
#signupForm { transform: translateX(30px); }

.form.active-form {
    position: relative;
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateX(0) !important;
}

/* Form Input - Transparan agar kaca di belakangnya tidak rusak */
input {
    width: 100%;
    padding: 16px 20px;
    margin-bottom: 16px;
    border-radius: 20px;
    
    background: rgba(0, 0, 0, 0.15);
    
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
    
    font-size: 16px;
    color: #ffffff;
    transition: all 0.3s ease;
    
    box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.15);
}

input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

input:focus {
    outline: none;
    background: rgba(0, 0, 0, 0.3);
    border-color: rgba(255, 255, 255, 0.7);
    box-shadow: 
        inset 0 4px 8px rgba(0, 0, 0, 0.2),
        0 0 0 4px rgba(255, 255, 255, 0.15);
}

/* Tombol Submit Glassy */
.submit-btn {
    width: 100%;
    margin-top: 8px;
    padding: 18px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 17px;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    
    /* Tombol juga dibuat seperti kaca terpisah */
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.05));
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-top: 1.5px solid rgba(255, 255, 255, 0.7);
    
    transition: all 0.2s ease;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    backdrop-filter: blur(10px);
}

.submit-btn:hover {
    background: rgba(255, 255, 255, 0.35);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.submit-btn:active {
    transform: translateY(2px);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

.submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

/* Responsivitas Mobile */
@media(max-width: 450px) {
    .container {
        width: 90%;
        padding: 35px 24px;
        border-radius: 40px;
    }
    .title {
        font-size: 26px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="title">
        MASUK/DAFTAR
    </div>

    <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="signupTab" class="not-active">Sign Up</button>
    </div>

    <div class="form-wrapper">
        <div id="loginForm" class="form active-form">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button class="submit-btn" onclick="login()">Login</button>
        </div>

        <div id="signupForm" class="form">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">
            <button class="submit-btn" onclick="signup()">Buat Akun</button>
        </div>
    </div>

</div>

<script>
// ==========================================
// KONFIGURASI CLOUDFLARE WORKER
// ==========================================
// Ganti URL ini jika URL Worker Anda berbeda
const CLOUDFLARE_WORKER_URL = "https://dark-wildflower-0a67.indomusicroom15.workers.dev/";

// Elemen UI
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

// Tab Switching
loginTab.onclick = function() {
    loginForm.classList.add("active-form");
    signupForm.classList.remove("active-form");
    loginTab.className = "active";
    signupTab.className = "not-active";
}

signupTab.onclick = function() {
    signupForm.classList.add("active-form");
    loginForm.classList.remove("active-form");
    signupTab.className = "active";
    loginTab.className = "not-active";
}

// ==========================================
// FUNGSI LOGIN & SIGNUP MELALUI CLOUDFLARE
// ==========================================

async function signup() {
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const btn = document.querySelector("#signupForm .submit-btn");

    if(!email || !password){
        alert("Lengkapi data email dan password!");
        return;
    }

    // Ubah teks tombol jadi loading
    btn.innerText = "Memproses...";
    btn.disabled = true;

    try {
        const response = await fetch(CLOUDFLARE_WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                action: "register", 
                email: email, 
                password: password 
            })
        });

        const data = await response.json();

        if (data.success) {
            alert("Akun berhasil dibuat! Silakan login.");
            // Pindahkan ke tab login secara otomatis
            signupForm.classList.remove("active-form");
            loginForm.classList.add("active-form");
            signupTab.className = "not-active";
            loginTab.className = "active";
        } else {
            alert("Gagal: " + (data.error || "Terjadi kesalahan saat mendaftar."));
        }
    } catch (error) {
        console.error("Error Worker:", error);
        alert("Kesalahan jaringan atau server tidak merespons.");
    }

    btn.innerText = "Buat Akun";
    btn.disabled = false;
}

async function login() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const btn = document.querySelector("#loginForm .submit-btn");

    if(!email || !password){
        alert("Masukkan email dan password!");
        return;
    }

    // Ubah teks tombol jadi loading
    btn.innerText = "Mengecek data...";
    btn.disabled = true;

    try {
        const response = await fetch(CLOUDFLARE_WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                action: "login", 
                email: email, 
                password: password 
            })
        });

        const data = await response.json();

        if (data.success) {
            // Jika login sukses, simpan sesi ke browser
            localStorage.setItem("isLogin", "true");
            localStorage.setItem("currentUser", email);
            
            // Arahkan ke file dashboard (pastikan nama file Anda benar, misalnya dashboard.html)
            window.location.href = "dashboard.html";
        } else {
            alert("Gagal: " + (data.error || "Email atau password salah"));
        }
    } catch (error) {
        console.error("Error Worker:", error);
        alert("Kesalahan jaringan atau server tidak merespons.");
    }

    btn.innerText = "Login";
    btn.disabled = false;
}
</script>


</body>
</html>
