<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0f0f0f,
#171717,
#1f1f1f
);
}

.container{
width:400px;
background:#111111;
border-radius:20px;
padding:30px;
box-shadow:
0 0 40px rgba(255,193,7,.15),
0 15px 40px rgba(0,0,0,.5);
border:1px solid rgba(255,193,7,.15);
}

.title{
text-align:center;
margin-bottom:20px;
font-size:28px;
font-weight:bold;
color:#ffc107;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.3s;
}

.active{
background:#ffc107;
color:#000;
}

.not-active{
background:#1b1b1b;
color:#999;
}

.form{
display:none;
}

.form.active-form{
display:block;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #333;
border-radius:12px;
background:#181818;
color:white;
outline:none;
transition:.3s;
}

input:focus{
border-color:#ffc107;
box-shadow:
0 0 15px rgba(255,193,7,.3);
}

input::placeholder{
color:#777;
}

.submit-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:
linear-gradient(
135deg,
#ffc107,
#ffb300
);
color:#000;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:
0 8px 20px rgba(255,193,7,.35);
}

</style>
</head>
<body>

<div class="container">

<div class="title">
🔐 Login System
</div>

<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="signupTab" class="not-active">Sign Up</button>
</div>

<div id="loginForm" class="form active-form">

<input type="email" id="loginEmail" placeholder="Email">

<input type="password" id="loginPassword" placeholder="Password">

<button class="submit-btn" onclick="login()">
Login
</button>

</div>

<div id="signupForm" class="form">

<input type="email" id="signupEmail" placeholder="Email">

<input type="password" id="signupPassword" placeholder="Password">

<button class="submit-btn" onclick="signup()">
Buat Akun
</button>

</div>

</div>

<script>
// ==========================================
// KONFIGURASI GITHUB API
// ==========================================
const GITHUB_TOKEN = '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';
const REPO_OWNER = 'gacor17'; 
const REPO_NAME = 'asia';
const FILE_PATH = 'user.json'; // Path file di dalam repo

let fileSha = null; // Diperlukan oleh GitHub API untuk meng-update file

// Elemen UI
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

// Tab Switching
loginTab.onclick = function() {
    loginForm.classList.add("active-form");
    signupForm.classList.remove("active-form");
    loginTab.className = "active";
    signupTab.className = "not-active";
}

signupTab.onclick = function() {
    signupForm.classList.add("active-form");
    loginForm.classList.remove("active-form");
    signupTab.className = "active";
    loginTab.className = "not-active";
}

// ==========================================
// FUNGSI GITHUB API
// ==========================================

// Fungsi mengambil data dari GitHub
async function fetchUsersFromGithub() {
    try {
        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            headers: {
                'Authorization': `Bearer ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });

        if (response.status === 404) {
            return []; // Jika file user.json belum ada di repo
        }

        if (!response.ok) throw new Error('Gagal mengambil data dari GitHub');

        const data = await response.json();
        fileSha = data.sha; // Simpan SHA untuk update file nanti

        // GitHub mengembalikan konten dalam format Base64, kita harus decode
        const decodedContent = decodeURIComponent(escape(atob(data.content)));
        return JSON.parse(decodedContent);

    } catch (error) {
        console.error(error);
        return []; // Kembalikan array kosong jika gagal
    }
}

// Fungsi menyimpan data ke GitHub
async function saveUsersToGithub(usersArray) {
    try {
        const contentStr = JSON.stringify(usersArray, null, 2);
        // Encode ke Base64 (mendukung karakter UTF-8)
        const encodedContent = btoa(unescape(encodeURIComponent(contentStr)));

        const body = {
            message: 'Update user.json via web login system',
            content: encodedContent
        };

        // Jika file sudah ada, GitHub API mewajibkan kita menyertakan SHA file yang lama
        if (fileSha) {
            body.sha = fileSha;
        }

        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });

        if (!response.ok) throw new Error('Gagal menyimpan data ke GitHub');
        
        const data = await response.json();
        fileSha = data.content.sha; // Update SHA dengan yang terbaru
        return true;

    } catch (error) {
        console.error(error);
        return false;
    }
}

// ==========================================
// FUNGSI LOGIN & SIGNUP
// ==========================================

async function signup() {
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const btn = document.querySelector("#signupForm .submit-btn");

    if(!email || !password){
        alert("Lengkapi data");
        return;
    }

    // Ubah teks tombol jadi loading
    btn.innerText = "Memproses...";
    btn.disabled = true;

    // Ambil data terbaru dari GitHub
    let users = await fetchUsersFromGithub();
    let cek = users.find(u => u.email === email);

    if(cek){
        alert("Email sudah terdaftar");
        btn.innerText = "Buat Akun";
        btn.disabled = false;
        return;
    }

    users.push({
        email: email,
        password: password
    });

    // Simpan kembali ke GitHub
    const success = await saveUsersToGithub(users);

    if (success) {
        alert("Akun berhasil dibuat dan disimpan di GitHub!");
        signupForm.classList.remove("active-form");
        loginForm.classList.add("active-form");
        
        signupTab.className = "not-active";
        loginTab.className = "active";
    } else {
        alert("Gagal menyimpan data ke repositori.");
    }

    btn.innerText = "Buat Akun";
    btn.disabled = false;
}

async function login() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const btn = document.querySelector("#loginForm .submit-btn");

    if(!email || !password){
        alert("Masukkan email dan password");
        return;
    }

    // Ubah teks tombol jadi loading
    btn.innerText = "Mengecek data...";
    btn.disabled = true;

    // Ambil data langsung dari GitHub untuk divalidasi
    let users = await fetchUsersFromGithub();
    
    let user = users.find(
        u => u.email === email && 
        u.password === password
    );

    if(user){
        // Untuk sesi aktif, kita tetap pakai localStorage
        localStorage.setItem("isLogin", "true");
        localStorage.setItem("currentUser", email);
        window.location.href = "dashboard.html";
    } else {
        alert("Email atau password salah");
    }

    btn.innerText = "Login";
    btn.disabled = false;
}
</script>


</body>
</html>
