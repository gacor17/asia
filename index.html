<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Sign Up</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #6a11cb,
        #2575fc,
        #00c6ff
    );
    padding:20px;
}

.container{
    width:400px;
    max-width:100%;
}

.card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.header{
    padding:35px 20px;
    text-align:center;
    color:white;
    background:linear-gradient(
        135deg,
        #ff6b6b,
        #ff9f43,
        #feca57
    );
}

.header i{
    font-size:55px;
    margin-bottom:10px;
}

.header h1{
    font-size:28px;
}

.tabs{
    display:flex;
}

.tab{
    flex:1;
    padding:15px;
    border:none;
    cursor:pointer;
    font-weight:600;
    background:#f5f5f5;
    transition:.3s;
}

.tab.active{
    background:white;
    color:#2575fc;
}

.form{
    display:none;
    padding:30px;
}

.form.active{
    display:block;
}

.input-group{
    position:relative;
    margin-bottom:18px;
}

.input-group i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
}

.input-group input{
    width:100%;
    padding:14px 14px 14px 45px;
    border:2px solid #eee;
    border-radius:12px;
    outline:none;
    transition:.3s;
}

.input-group input:focus{
    border-color:#2575fc;
}

.btn{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.login-btn{
    background:linear-gradient(
        135deg,
        #2575fc,
        #00c6ff
    );
}

.signup-btn{
    background:linear-gradient(
        135deg,
        #ff6b6b,
        #ff9f43
    );
}

.btn:hover{
    transform:translateY(-2px);
}

.social{
    margin-top:20px;
    text-align:center;
}

.social p{
    margin-bottom:15px;
    color:#888;
}

.icons{
    display:flex;
    justify-content:center;
    gap:15px;
}

.icons a{
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    text-decoration:none;
    color:white;
    font-size:18px;
}

.google{
    background:#ea4335;
}

.facebook{
    background:#1877f2;
}

.github{
    background:#333;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="header">
    <i class="fa-solid fa-user-shield"></i>
    <h1>Welcome</h1>
    <p>Login atau Buat Akun Baru</p>
</div>

<div class="tabs">
    <button class="tab active" onclick="showForm('login')">
        Login
    </button>

    <button class="tab" onclick="showForm('signup')">
        Sign Up
    </button>
</div>

<form id="login" class="form active">

    <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Email">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password">
    </div>

    <button class="btn login-btn">
        <i class="fa-solid fa-right-to-bracket"></i>
        Login
    </button>

</form>

<form id="signup" class="form">

    <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Nama Lengkap">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Email">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password">
    </div>

    <button class="btn signup-btn">
        <i class="fa-solid fa-user-plus"></i>
        Buat Akun
    </button>

</form>

<div class="social">
    <p>Atau lanjutkan dengan</p>

    <div class="icons">
        <a href="#" class="google">
            <i class="fab fa-google"></i>
        </a>

        <a href="#" class="facebook">
            <i class="fab fa-facebook-f"></i>
        </a>

        <a href="#" class="github">
            <i class="fab fa-github"></i>
        </a>
    </div>
</div>

</div>

</div>

<script>

function showForm(type){

    document
        .querySelectorAll(".form")
        .forEach(f=>f.classList.remove("active"));

    document
        .querySelectorAll(".tab")
        .forEach(t=>t.classList.remove("active"));

    document
        .getElementById(type)
        .classList.add("active");

    event.target.classList.add("active");
}

</script>

</body>
</html>
