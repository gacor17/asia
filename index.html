<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Streaming</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial, sans-serif;
}
.video-wrapper{
  max-width:900px;
  margin:auto;
}
.card{
  background:#1f1f1f;
  padding:12px;
  border-radius:10px;
}
.card:hover{
  background:#2a2a2a;
}
</style>
</head>
<body class="p-6">

<h1 class="text-2xl font-bold mb-6">Streaming Video</h1>

<div class="video-wrapper">
  <video id="player" controls class="w-full rounded-xl bg-black"></video>
  <h2 id="video-title" class="text-xl font-bold mt-4"></h2>
  <button id="download" class="mt-3 bg-blue-600 px-4 py-2 rounded">Download</button>
</div>

<section class="mt-10">
  <h3 class="text-lg font-bold mb-4">Rekomendasi</h3>
  <div id="rekomendasi" class="grid md:grid-cols-3 gap-4"></div>
</section>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const JSON_URL = "https://raw.githubusercontent.com/USERNAME/REPO/main/Video.json"; // GANTI

// ==========================
// AMBIL ID DARI SEMUA FORMAT URL
// ==========================

function getVideoId(){
  const params = new URLSearchParams(window.location.search);

  if(params.get("e")) return params.get("e");
  if(params.get("id")) return params.get("id");

  let path = window.location.pathname.replace(/^\\//,'');

  if(path.startsWith("e/")) return path.substring(2);
  if(path) return path;

  return null;
}

const videoId = getVideoId();

if(!videoId){
  alert("ID video tidak ditemukan di URL");
  return;
}

try{

const res = await axios.get(JSON_URL);
const videos = res.data;

if(!Array.isArray(videos)){
  alert("Format JSON salah, harus array []");
  return;
}

const current = videos.find(v => v.id == videoId);

if(!current){
  alert("Video tidak ditemukan di JSON");
  return;
}

const player = document.getElementById("player");
const title = document.getElementById("video-title");
const download = document.getElementById("download");

player.src = current.Url;
title.textContent = current.Judul;
download.onclick = ()=> window.location.href = current.Url;

renderRekomendasi(videos, videoId);

}catch(err){
console.error(err);
alert("Gagal memuat JSON");
}

function renderRekomendasi(videos,currentId){

const list = videos
  .filter(v=>v.id!=currentId)
  .sort(()=>0.5-Math.random())
  .slice(0,5);

document.getElementById("rekomendasi").innerHTML =
list.map(v=>`
  <a href="?e=${v.id}" class="card block">
    ${v.Judul}
  </a>
`).join("");

}

});
</script>

</body>
</html>
