<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0f0f0f,
#171717,
#1f1f1f
);
}

.container{
width:400px;
background:#111111;
border-radius:20px;
padding:30px;
box-shadow:
0 0 40px rgba(255,193,7,.15),
0 15px 40px rgba(0,0,0,.5);
border:1px solid rgba(255,193,7,.15);
}

.title{
text-align:center;
margin-bottom:20px;
font-size:28px;
font-weight:bold;
color:#ffc107;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.3s;
}

.active{
background:#ffc107;
color:#000;
}

.not-active{
background:#1b1b1b;
color:#999;
}

.form{
display:none;
}

.form.active-form{
display:block;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #333;
border-radius:12px;
background:#181818;
color:white;
outline:none;
transition:.3s;
}

input:focus{
border-color:#ffc107;
box-shadow:
0 0 15px rgba(255,193,7,.3);
}

input::placeholder{
color:#777;
}

.submit-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:
linear-gradient(
135deg,
#ffc107,
#ffb300
);
color:#000;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:
0 8px 20px rgba(255,193,7,.35);
}

</style>
</head>

🔐 Login System

</div>

<input type="password" id="loginPassword" placeholder="Password">

<button class="submit-btn" onclick="login()">
Login
</button>

</div>

<div id="signupForm" class="form">

<input type="email" id="signupEmail" placeholder="Email">

<input type="password" id="signupPassword" placeholder="Password">

<button class="submit-btn" onclick="signup()">
Buat Akun
</button>

</div>

</div>
