<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

:root{
--bg:#05060a;
--card:#0d1018;
--border:#1a1f2b;
--text:#ffffff;
--muted:#8d93a6;
--pink:#ff4f8b;
--blue:#38bdf8;
--green:#22c55e;
--orange:#fb923c;
--purple:#a855f7;
--yellow:#facc15;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--bg);
color:white;
padding:20px;
padding-bottom:100px;
}

.container{
max-width:900px;
margin:auto;
}

.logo{
font-size:32px;
font-weight:700;
margin-bottom:25px;
}

.logo span{
color:var(--pink);
}

.top-icons{
display:flex;
gap:15px;
float:right;
}

.top-icons i{
font-size:22px;
color:white;
}

.profile-card{
background:var(--card);
border:1px solid var(--border);
border-radius:24px;
padding:20px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.profile-left{
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:75px;
height:75px;
border-radius:50%;
background:#d9d9d9;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
color:#777;
}

.profile-info span{
color:var(--muted);
font-size:14px;
}

.profile-info h2{
margin-top:5px;
font-size:30px;
}

.profile-info p{
margin-top:5px;
color:var(--muted);
}

.badge{
background:#707483;
padding:10px 18px;
border-radius:40px;
font-weight:600;
}

.section-title{
font-size:36px;
font-weight:700;
margin:25px 0;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:20px;
}

.icon-circle{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
margin-bottom:15px;
}

.green{background:rgba(34,197,94,.15);color:var(--green);}
.blue{background:rgba(56,189,248,.15);color:var(--blue);}
.orange{background:rgba(251,146,60,.15);color:var(--orange);}
.purple{background:rgba(168,85,247,.15);color:var(--purple);}
.pink{background:rgba(255,79,139,.15);color:var(--pink);}

.card h3{
color:var(--muted);
font-weight:500;
margin-bottom:10px;
}

.card h2{
font-size:38px;
}

.balance{
margin-top:15px;
}

.balance h2{
color:var(--pink);
}

.leaderboard{
margin-top:20px;
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:25px;
}

.rank-tag{
background:var(--yellow);
color:black;
padding:10px 20px;
border-radius:30px;
font-weight:700;
display:inline-block;
margin-top:10px;
}

.btn{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:16px;
background:linear-gradient(
135deg,
#411927,
#61253b
);
color:#ff6d9e;
font-size:22px;
font-weight:700;
cursor:pointer;
}

.logout{
margin-top:20px;
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#ff4757;
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#090b12;
border-top:1px solid #1d2230;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.bottom-nav a{
color:white;
font-size:28px;
text-decoration:none;
}

.plus{
font-size:42px !important;
margin-top:-8px;
color:var(--pink)!important;
}

@media(max-width:768px){

.profile-card{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

.profile-info h2{
font-size:24px;
}

.section-title{
font-size:28px;
}

}

</style>
</head>
<body>

<script>

if(localStorage.getItem("isLogin") !== "true"){
window.location.href="index.html";
}

</script>

<div class="container">

<div class="logo">
<span>V</span> Dashboard
</div>

<div class="profile-card">

<div class="profile-left">

<div class="avatar">
<i class="fa-solid fa-user"></i>
</div>

<div class="profile-info">
<span>Welcome,</span>
<h2 id="username">User</h2>
<p id="joinDate">Joined Today</p>
</div>

</div>

<div class="badge">
Basic
</div>

</div>

<h1 class="section-title">
Overview
</h1>

<div class="stats">

<div class="card">
<div class="icon-circle green">
<i class="fa-solid fa-circle"></i>
</div>
<h3>Online</h3>
<h2>1</h2>
</div>

<div class="card">
<div class="icon-circle blue">
<i class="fa-solid fa-eye"></i>
</div>
<h3>Views</h3>
<h2>0</h2>
</div>

<div class="card">
<div class="icon-circle orange">
<i class="fa-solid fa-money-bill"></i>
</div>
<h3>Revenue</h3>
<h2>$0.00</h2>
</div>

<div class="card">
<div class="icon-circle purple">
<i class="fa-solid fa-calendar"></i>
</div>
<h3>This Week</h3>
<h2>$0.00</h2>
</div>

</div>

<div class="card balance">

<div class="icon-circle green">
<i class="fa-solid fa-wallet"></i>
</div>

<h3>Balance</h3>

<h2>$0.000</h2>

</div>

<div class="leaderboard">

<h3 style="color:#ff6d9e;">
Daily Rank
</h3>

<h1 style="margin-top:10px;">
Leaderboard
</h1>

<div class="rank-tag">
🏆 Rank -
</div>

<button class="btn">
View Leaderboard
</button>

</div>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<nav class="bottom-nav">

<a href="#">
<i class="fa-solid fa-house"></i>
</a>

<a href="#">
<i class="fa-regular fa-folder"></i>
</a>

<a href="#">
<i class="fa-solid fa-plus plus"></i>
</a>

<a href="#">
<i class="fa-solid fa-magnifying-glass"></i>
</a>

<a href="#">
<i class="fa-solid fa-user"></i>
</a>

</nav>

<script>

const username =
localStorage.getItem("currentUser") || "Guest";

document.getElementById("username").textContent =
username.split("@")[0];

const today = new Date();

document.getElementById("joinDate").textContent =
"Joined " +
today.toLocaleDateString("id-ID",{
day:"2-digit",
month:"short",
year:"numeric"
});

function logout(){

localStorage.removeItem("isLogin");
localStorage.removeItem("currentUser");

window.location.href="index.html";

}

</script>

</body>
</html>
